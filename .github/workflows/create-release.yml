name: Create Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode PBW
        run: |
          cat .github/pbw_b64.txt | base64 -d > duostats.pbw
          echo "PBW size: $(wc -c < duostats.pbw) bytes"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0
          release_name: DuoStats v1.0.0
          body: |
            Initial release of DuoStats watchface for Pebble 2.

            ### Install
            Download `duostats.pbw` below and open it with the Pebble / Rebble app on your phone.

            ### What's included
            - Compiled binaries for all 5 Pebble platforms (diorite/Pebble 2, basalt, chalk, emery, aplite)
            - Time display in top 1/3, four configurable health data boxes in bottom 2/3
            - Dark and light mode
            - Configurable box data sources: Steps, Distance, Calories, Sleep
          draft: false
          prerelease: false

      - name: Upload PBW Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./duostats.pbw
          asset_name: duostats.pbw
          asset_content_type: application/octet-stream
