name: Create v1.0.0 Release

on:
  push:
    branches: [main]
    paths: ['.github/workflows/create-release.yml']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          openssl enc -d -base64 -A -in .github/pbw_b64.txt -out duostats.pbw
          echo "PBW size: $(wc -c < duostats.pbw) bytes"
          gh release create v1.0.0 --title 'DuoStats v1.0.0' --notes-file .github/release_notes.md duostats.pbw
