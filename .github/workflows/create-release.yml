name: Create v1.0.0 Release

on:
  push:
    branches: [main]
    paths: ['.github/workflows/create-release.yml']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode PBW
        run: |
          base64 -d .github/pbw_b64.txt > duostats.pbw
          echo "PBW size: $(wc -c < duostats.pbw) bytes"

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release
          RELEASE_RESPONSE=$(gh release create v1.0.0 \
            --title "DuoStats v1.0.0" \
            --notes "Initial release of DuoStats watchface for Pebble 2.

## Install
Download \`duostats.pbw\` below and open it with the Pebble / Rebble app on your phone.

## What is included
- Compiled binaries for all 5 Pebble platforms (diorite/Pebble 2, basalt, chalk, emery, aplite)
- Time display in top 1/3, four configurable health data boxes in bottom 2/3
- Dark and light mode
- Configurable box data sources: Steps, Distance, Calories, Sleep" \
            duostats.pbw \
            2>&1)
          echo "Release result: $RELEASE_RESPONSE"
